syntax = "proto3";

option java_package         = "com.push.core.proto";
option java_outer_classname = "UserSessionProto";
option java_multiple_files  = true;

// 持久化的用户会话
message UserSessionData {
    string user_id             = 1;   // 用户唯一 ID（空字符串 = 未登录）
    repeated string group_ids  = 2;   // 所属分组列表
    int64  login_at            = 3;   // 登录时间戳（ms）
    bool   subscribe_broadcast = 4;   // 是否订阅全量广播
    map<string, string> extras = 5;   // 扩展字段（业务自定义 KV）
    string token               = 6;   // MQTT 鉴权 token
    int64  token_expires_at    = 7;   // token 过期时间戳（ms）
    string app_id              = 8;   // 应用标识，用于主题前缀
    repeated string subscribed_topics = 9;  // 已订阅的主题列表（持久化，重连后恢复）
}
